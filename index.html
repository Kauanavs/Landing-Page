<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="stylesheet" href="/media.css">
</head>
<body>
    <header>
        <div class="titulo">
            <h1>
                <span>Marketing</span>
                <span>Criativo</span>
            </h1>
        </div>

        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
                <li><a href="#" class="btn">Já tem uma conta?</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="conteudo">
                <h2>
                    <span>Inscreva-se agora</span>
                    <span>na Save Studios</span>
                </h2>

                <p>
                    Transformamos ideias em experiências através do audiovisual, combinando estética, estratégia e narrativa...
                </p>

                <form>
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required>

                    <label for="email">E-mail</label>
                    <input type="email" id="email" required>

                    <button type="submit">Enviar</button>
                </form>
            </div>

            <div class="imagem">
                <img src="Imagens/77d0a7c454e658833800528e748edbe9.png" alt="Ilustração mulher roxa">
            </div>
        </section>
    </main>
</body>
</html>
